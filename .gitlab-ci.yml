stages:
  - validate
  - smoke_test
  - docker_check

default:
  tags:
    - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"
  HOST: "127.0.0.1"
  PORT: "8080"
  LOGBOOK_USERNAME: "ci-test-user"
  LOGBOOK_PASSWORD: "ci-test-password"
  SECRET_KEY: "ci-only-session-signing-key"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

validate_python_app:
  stage: validate
  image: python:3.12-slim
  script:
    - python --version
    - pip install -r requirements.txt
    - python -m compileall .
    - python -m unittest discover -s tests -v
    - test -f server.py
    - test -f requirements.txt
    - test -f index.html
    - test -f docker-compose.yml || test -f compose.yml || echo "No compose file found"

smoke_test_flask_server:
  stage: smoke_test
  image: python:3.12-slim
  needs:
    - validate_python_app
  script:
    - pip install -r requirements.txt
    - mkdir -p data/uploads backups
    - python server.py &
    - SERVER_PID=$!
    - sleep 5
    - >-
      python -c "import base64, urllib.request; token=base64.b64encode(b'ci-test-user:ci-test-password').decode(); request=urllib.request.Request('http://127.0.0.1:8080', headers={'Authorization': f'Basic {token}'}); r=urllib.request.urlopen(request, timeout=10); print('Status:', r.status); exit(0 if r.status < 400 else 1)"
    - kill "$SERVER_PID"

docker_compose_config_check:
  stage: docker_check
  image: docker:27
  script:
    - docker compose version
    - docker compose config
  rules:
    - exists:
        - docker-compose.yml
        - compose.yml
