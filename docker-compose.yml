services:
  selfhostable-fishing-logbook:
    build: .
    container_name: selfhostable-fishing-logbook
    ports:
      - "80:8080"
    volumes:
      - ./data:/app/data
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
    restart: unless-stopped
